[pytest]
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning:starlette.testclient
    # numpy 2.x + pandas timedelta deprecation surfaces only on bleeding-edge
    # interpreters (py3.14); pinned Docker image (py3.12) is unaffected.
    ignore:.*generic.*unit for NumPy timedelta.*:DeprecationWarning
    # third-party (mlflow internals) deprecation noise
    ignore::DeprecationWarning:mlflow
    ignore:.*min_items.*:DeprecationWarning
    ignore:.*codecs.open.*:DeprecationWarning
